# NPT Completion-Deficit Dark Energy
# V(N) = V_0 * (1 - exp(-sqrt(2/3)*N))^2
# V_0 = scf_parameters[0], tuned via scf_tuning_index = 0

output = tCl,pCl,lCl,mPk
lensing = yes

h = 0.6777
T_cmb = 2.7255
omega_b = 0.02237
omega_cdm = 0.1200
N_ur = 2.0328
N_ncdm = 1
m_ncdm = 0.06

Omega_Lambda = 0
Omega_fld = 0
Omega_scf = -1

# [V_0, unused, unused, unused, phi_ini, phi_prime_ini]
# V_0 initial guess ~1e-120 in Planck units, but CLASS uses Mpc^-2
# For h=0.6777, H_0 ~ 2.2e-4 Mpc^-1, so V_0 ~ 3*H0^2*0.7 ~ 1e-7 Mpc^-2
scf_parameters = 1e-7, 1.0, 1.0, 1.0, 3.0, 0.0
attractor_ic_scf = no
scf_tuning_index = 0

# Override the initial shooting guess

A_s = 2.1e-9
n_s = 0.9649
tau_reio = 0.0544

l_max_scalars = 2500
P_k_max_h/Mpc = 1.

root = output/npt_
write background = yes

background_verbose = 2
thermodynamics_verbose = 1
perturbations_verbose = 1
harmonic_verbose = 1
fourier_verbose = 1
lensing_verbose = 1
output_verbose = 1
